<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://sf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.6.5.js"></script>
</head>
<body>

<div id="app">⏳ Loading...</div>

<script>
window.onload = function () {

  const app = document.getElementById("app");

  if (typeof lark === "undefined") {
    app.innerHTML = "❌ Lark SDK ไม่โหลด";
    return;
  }

  lark.ready(() => {

    app.innerHTML = "📲 กำลังดึงข้อมูลผู้ใช้...";

    lark.biz.user.get({
      success: (res) => {

        fetch("https://hook.us2.make.com/mamlx3cksk0x9hl3skdng3eyehbv41kc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId: res.userId,
            name: res.name
          })
        })
        .then(() => {
          app.innerHTML = "✅ Check-in สำเร็จ";
        })
        .catch(err => {
          app.innerHTML = "❌ Fetch error: " + err;
        });

      },
      fail: (err) => {
        app.innerHTML = "❌ Lark error: " + JSON.stringify(err);
      }
    });

  });

};
</script>

</body>
</html>
